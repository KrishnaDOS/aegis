<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aegis</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="profile-page">

  <!-- Top navigation bar -->
  <nav class="top-nav">
    <a href="chat.html" class="top-nav-logo">AEGIS</a>
    <div class="top-nav-right">
      <span class="top-nav-encrypt">&#128274; Post-Quantum Encrypted</span>
      <a href="groups.html" class="btn btn-ghost btn-sm">My Groups</a>
      <a href="index.html" class="btn btn-ghost btn-sm">Log Out</a>
    </div>
  </nav>

  <div class="profile-layout">

    <!-- Profile card -->
    <div class="profile-card">

      <!-- Avatar -->
      <div class="profile-avatar-section">
        <div class="profile-avatar">U</div>
        <button class="btn btn-ghost btn-sm" onclick="alert('Photo upload requires backend.')">Change Photo</button>
      </div>

      <!-- Info -->
      <div class="profile-fields">
        <h2 class="profile-heading">My Profile</h2>

        <div class="form-group">
          <label for="profile-username">Username</label>
          <input type="text" id="profile-username" value="User" disabled />
        </div>

        <div class="form-group">
          <label for="profile-email">Email</label>
          <input type="email" id="profile-email" value="user@example.com" disabled />
        </div>


        <div id="profile-message" class="form-message hidden"></div>

        <div class="profile-actions">
          <button id="edit-btn" class="btn btn-primary" onclick="enableEdit()">Edit</button>
          <button id="save-btn" class="btn btn-primary hidden" onclick="saveProfile()">Save</button>
          <button id="cancel-btn" class="btn btn-ghost hidden" onclick="cancelEdit()">Cancel</button>
        </div>
      </div>

    </div>

    <!-- Change Password card -->
    <div class="profile-card">
      <div class="profile-fields">
        <h2 class="profile-heading">Change Password</h2>

        <div class="form-group">
          <label for="current-pass">Current Password</label>
          <input type="password" id="current-pass" placeholder="Enter current password" />
        </div>

        <div class="form-group">
          <label for="new-pass">New Password</label>
          <input type="password" id="new-pass" placeholder="Enter new password" />
        </div>

        <div class="form-group">
          <label for="confirm-pass">Confirm New Password</label>
          <input type="password" id="confirm-pass" placeholder="Confirm new password" />
        </div>

        <div id="password-message" class="form-message hidden"></div>

        <button class="btn btn-primary" onclick="changePassword()">Update Password</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
