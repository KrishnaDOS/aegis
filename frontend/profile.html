<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aegis</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="profile-page">

  <!-- Top navigation bar -->
  <nav class="top-nav">
    <a href="chat.html" class="top-nav-logo">AEGIS</a>
    <div class="top-nav-right">
      <span class="top-nav-encrypt">&#128274; Post-Quantum Encrypted</span>
      <a href="#" class="btn btn-ghost btn-sm" onclick="handleLogout()">Log Out</a>
    </div>
  </nav>

  <div class="profile-layout">
    <div style="display:flex; justify-content:flex-end; margin-bottom:8px;">
      <a href="javascript:history.back()" class="btn btn-ghost btn-sm" title="Go back" style="font-size:18px; line-height:1;">&times;</a>
    </div>

    <!-- Profile card -->
    <div class="profile-card">

      <!-- Avatar -->
      <div class="profile-avatar-section">
        <div class="profile-avatar">U</div>
        <button class="btn btn-ghost btn-sm" onclick="alert('Photo upload requires backend.')">Change Photo</button>
      </div>

      <!-- Info -->
      <div class="profile-fields">
        <h2 class="profile-heading">My Profile</h2>

        <div class="form-group">
          <label for="profile-username">Username</label>
          <input type="text" id="profile-username" value="User" disabled />
        </div>

        <div class="form-group">
          <label for="profile-email">Email</label>
          <input type="email" id="profile-email" value="user@example.com" disabled />
        </div>


        <div id="profile-message" class="form-message hidden"></div>

        <div class="profile-actions">
          <button id="edit-btn" class="btn btn-primary" onclick="enableEdit()">Edit</button>
          <button id="save-btn" class="btn btn-primary hidden" onclick="saveProfile()">Save</button>
          <button id="cancel-btn" class="btn btn-ghost hidden" onclick="cancelEdit()">Cancel</button>
        </div>
      </div>

    </div>

    <!-- Change Password card -->
    <div class="profile-card">
      <div class="profile-fields">
        <h2 class="profile-heading">Change Password</h2>

        <div class="form-group">
          <label for="current-pass">Current Password</label>
          <input type="password" id="current-pass" placeholder="Enter current password" />
        </div>

        <div class="form-group">
          <label for="new-pass">New Password</label>
          <input type="password" id="new-pass" placeholder="Enter new password" />
        </div>

        <div class="form-group">
          <label for="confirm-pass">Confirm New Password</label>
          <input type="password" id="confirm-pass" placeholder="Confirm new password" />
        </div>

        <div id="password-message" class="form-message hidden"></div>

        <button class="btn btn-primary" onclick="changePassword()">Update Password</button>
      </div>
    </div>

  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut,
             EmailAuthProvider, reauthenticateWithCredential, updatePassword }
      from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDcugecgT1ZS0iGxpamr9qG7PDnQ-SlFp4",
      authDomain: "aegis-f5e17.firebaseapp.com",
      projectId: "aegis-f5e17",
      storageBucket: "aegis-f5e17.firebasestorage.app",
      messagingSenderId: "878102859879",
      appId: "1:878102859879:web:813def60200064c15904c2"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = 'index.html'; return; }
      currentUser = user;
      document.getElementById('profile-email').value    = user.email;
      document.getElementById('profile-username').value = user.email.split('@')[0];
    });

    window.changePassword = async function() {
      const current = document.getElementById('current-pass').value;
      const newPass = document.getElementById('new-pass').value;
      const confirm = document.getElementById('confirm-pass').value;

      if (!current || !newPass || !confirm) {
        showMessage('password-message', 'Please fill in all fields.', 'error');
        return;
      }
      if (newPass.length < 8) {
        showMessage('password-message', 'New password must be at least 8 characters.', 'error');
        return;
      }
      if (newPass !== confirm) {
        showMessage('password-message', 'Passwords do not match.', 'error');
        return;
      }

      try {
        const credential = EmailAuthProvider.credential(currentUser.email, current);
        await reauthenticateWithCredential(currentUser, credential);
        await updatePassword(currentUser, newPass);

        document.getElementById('current-pass').value = '';
        document.getElementById('new-pass').value     = '';
        document.getElementById('confirm-pass').value = '';
        showMessage('password-message', 'Password updated successfully!', 'success');
      } catch (error) {
        if (error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
          showMessage('password-message', 'Current password is incorrect.', 'error');
        } else {
          showMessage('password-message', 'Could not update password. Try again.', 'error');
        }
      }
    };

    window.handleLogout = function() {
      signOut(auth).then(() => { window.location.href = 'index.html'; });
    };
  </script>

  <script src="validation.js"></script>
  <script src="script.js"></script>
</body>
</html>
