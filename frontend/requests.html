<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aegis – Join Requests</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="audit-page">

  <!-- Top navigation bar -->
  <nav class="top-nav">
    <a href="chat.html" class="top-nav-logo">AEGIS</a>
    <div class="top-nav-right">
      <span class="top-nav-encrypt">&#128274; Post-Quantum Encrypted</span>
      <a href="#" class="btn btn-ghost btn-sm" onclick="handleLogout()">Log Out</a>
    </div>
  </nav>

  <div class="audit-layout">

    <div style="display:flex; justify-content:flex-end; margin-bottom:8px;">
      <a href="javascript:history.back()" class="btn btn-ghost btn-sm" title="Go back" style="font-size:18px; line-height:1;">&times;</a>
    </div>

    <!-- Page header -->
    <div class="audit-page-header">
      <div>
        <h2 class="audit-title">Join Requests — <span id="req-group-name">...</span> <span class="admin-only-badge">Group Admin Only</span></h2>
        <p class="audit-subtitle">Approve or deny membership requests for this group</p>
      </div>
    </div>

    <!-- Requests table -->
    <div class="audit-table-wrap">
      <table class="audit-table">
        <thead>
          <tr>
            <th>User</th>
            <th>Email</th>
            <th>Requested At</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="requests-body">
          <tr><td colspan="4" style="text-align:center;padding:16px;color:var(--text-3);">Loading...</td></tr>
        </tbody>
      </table>
      <p id="requests-empty" class="audit-no-results hidden">No pending join requests.</p>
    </div>

  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
    import { getFirestore, collection, doc, getDoc, getDocs, deleteDoc, updateDoc, addDoc, arrayUnion, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDcugecgT1ZS0iGxpamr9qG7PDnQ-SlFp4",
      authDomain: "aegis-f5e17.firebaseapp.com",
      projectId: "aegis-f5e17",
      storageBucket: "aegis-f5e17.firebasestorage.app",
      messagingSenderId: "878102859879",
      appId: "1:878102859879:web:813def60200064c15904c2"
    };

    const app     = initializeApp(firebaseConfig);
    const auth    = getAuth(app);
    const db      = getFirestore(app);
    const groupId = new URLSearchParams(window.location.search).get('groupId');

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    let currentUser = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'index.html'; return; }
      currentUser = user;

      if (!groupId) {
        document.getElementById('requests-body').innerHTML =
          '<tr><td colspan="4" style="text-align:center;padding:16px;color:var(--text-3);">No group specified.</td></tr>';
        return;
      }

      const groupSnap = await getDoc(doc(db, 'groups', groupId));
      if (!groupSnap.exists()) {
        document.getElementById('req-group-name').textContent = 'Unknown';
        document.getElementById('requests-body').innerHTML =
          '<tr><td colspan="4" style="text-align:center;padding:16px;color:var(--text-3);">Group not found.</td></tr>';
        return;
      }

      const g       = groupSnap.data();
      const isAdmin = g.ownerID === user.uid || (g.roles && g.roles[user.uid] === 'admin');

      if (!isAdmin) {
        document.getElementById('req-group-name').textContent = g.name;
        document.getElementById('requests-body').innerHTML =
          '<tr><td colspan="4" style="text-align:center;padding:16px;color:var(--text-3);">Access denied. Group admins only.</td></tr>';
        return;
      }

      document.getElementById('req-group-name').textContent = g.name;
      await loadRequests();
    });

    async function loadRequests() {
      const tbody = document.getElementById('requests-body');
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:16px;color:var(--text-3);">Loading...</td></tr>';

      const snap = await getDocs(collection(db, 'groups', groupId, 'joinRequests'));

      if (snap.empty) {
        tbody.innerHTML = '';
        document.getElementById('requests-empty').classList.remove('hidden');
        return;
      }

      document.getElementById('requests-empty').classList.add('hidden');
      tbody.innerHTML = '';

      snap.forEach(reqDoc => {
        const r    = reqDoc.data();
        const name = r.userEmail ? r.userEmail.split('@')[0] : reqDoc.id;
        const ts   = r.requestedAt ? r.requestedAt.toDate().toLocaleString() : '—';

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="log-user">${esc(name)}</td>
          <td class="log-detail">${esc(r.userEmail || reqDoc.id)}</td>
          <td class="log-time">${esc(ts)}</td>
          <td style="display:flex;gap:8px;padding:10px 12px;">
            <button class="btn btn-primary btn-sm" onclick="approveRequest('${reqDoc.id}','${esc(r.userEmail || '')}',this)">&#10003; Approve</button>
            <button class="btn btn-danger btn-sm" onclick="denyRequest('${reqDoc.id}',this)">&#10007; Deny</button>
          </td>`;
        tbody.appendChild(tr);
      });
    }

    window.approveRequest = async function(userUID, userEmail, btn) {
      btn.disabled = true;
      try {
        await updateDoc(doc(db, 'groups', groupId), {
          members:              arrayUnion(userUID),
          [`roles.${userUID}`]: 'member'
        });
        await deleteDoc(doc(db, 'groups', groupId, 'joinRequests', userUID));
        await addDoc(collection(db, 'groups', groupId, 'auditLog'), {
          type:      'member',
          action:    `Approved join request from ${userEmail || userUID}`,
          userEmail: currentUser.email,
          userUID:   currentUser.uid,
          timestamp: serverTimestamp()
        });
        btn.closest('tr').remove();
        if (document.querySelectorAll('#requests-body tr').length === 0) {
          document.getElementById('requests-empty').classList.remove('hidden');
        }
      } catch (e) {
        btn.disabled = false;
        alert('Could not approve request. Try again.');
      }
    };

    window.denyRequest = async function(userUID, btn) {
      btn.disabled = true;
      try {
        await deleteDoc(doc(db, 'groups', groupId, 'joinRequests', userUID));
        await addDoc(collection(db, 'groups', groupId, 'auditLog'), {
          type:      'member',
          action:    `Denied join request`,
          userEmail: currentUser.email,
          userUID:   currentUser.uid,
          timestamp: serverTimestamp()
        });
        btn.closest('tr').remove();
        if (document.querySelectorAll('#requests-body tr').length === 0) {
          document.getElementById('requests-empty').classList.remove('hidden');
        }
      } catch (e) {
        btn.disabled = false;
        alert('Could not deny request. Try again.');
      }
    };

    window.handleLogout = function() {
      signOut(auth).then(() => { window.location.href = 'index.html'; });
    };
  </script>

  <script src="validation.js"></script>
  <script src="script.js"></script>
</body>
</html>
